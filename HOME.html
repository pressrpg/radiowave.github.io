<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioWave – Ouça o Mundo ao Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f14;--surface:#141720;--surface2:#1c2030;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--text2:#8b92a8;--accent:#00e5a0;--accent2:#00b87a;--ph:78px;--sw:240px}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#00e5a0,#0099ff);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo-icon svg{width:22px;height:22px}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:#fff;letter-spacing:-.02em;line-height:1}
  .logo-text span{color:var(--accent)}
  header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:20px;flex-shrink:0;z-index:100}
  .hsearch{flex:1;max-width:460px;display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 14px;gap:8px}
  .hsearch svg{color:var(--text2);flex-shrink:0}
  .hsearch input{background:none;border:none;outline:none;color:var(--text);font:inherit;font-size:.875rem;width:100%;padding:8px 0}
  .hsearch input::placeholder{color:var(--text2)}
  .hnav{display:flex;gap:4px;margin-left:auto}
  .hnav a{color:var(--text2);text-decoration:none;font-size:.82rem;font-weight:500;padding:6px 12px;border-radius:6px;transition:background .15s}
  .hnav a:hover{background:var(--surface2);color:var(--text)}
  .app{flex:1;display:flex;overflow:hidden}
  aside{width:var(--sw);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding-bottom:12px}
  aside::-webkit-scrollbar{width:4px}
  aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .aside-sec{padding:18px 12px 8px}
  .aside-lbl{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);padding:0 8px 8px}
  .ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:.875rem;color:var(--text2);font-weight:500;user-select:none}
  .ni:hover{background:var(--surface2);color:var(--text)}
  .ni.active{background:rgba(0,229,160,.12);color:var(--accent)}
  .ni .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .ni .cnt{margin-left:auto;font-size:.72rem;color:var(--text2);background:var(--surface2);padding:2px 7px;border-radius:99px}
  .ni.active .cnt{background:rgba(0,229,160,.15);color:var(--accent)}
  aside hr{border:none;border-top:1px solid var(--border);margin:8px 12px}
  .slogo{padding:18px 20px 0}
  main{flex:1;overflow-y:auto;padding-bottom:20px}
  main::-webkit-scrollbar{width:6px}
  main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .hero{padding:32px 32px 24px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(0,229,160,.04) 0%,transparent 60%)}
  .hero-rl{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .hero h1{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;line-height:1.1;margin-bottom:8px;letter-spacing:-.02em}
  .hero p{font-size:.875rem;color:var(--text2)}
  .feat-strip{padding:24px 32px;border-bottom:1px solid var(--border)}
  .sec-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .live-badge{font-size:.62rem;background:#e74c3c;color:#fff;padding:2px 7px;border-radius:4px;font-weight:700;animation:pb 2s infinite}
  @keyframes pb{0%,100%{opacity:1}50%{opacity:.6}}
  .feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .fc{border-radius:14px;padding:18px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
  .fc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--fcc,var(--accent));opacity:.7}
  .fc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);border-color:rgba(255,255,255,.12)}
  .fc.playing{border-color:var(--accent)}
  .fc-logo{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.68rem;font-weight:800;color:#fff;flex-shrink:0}
  .fc-info .fc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
  .fc-info .fc-sub{font-size:.75rem;color:var(--text2)}
  .stations-sec{padding:20px 32px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
  .sc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--scc,#00e5a0) 0%,transparent 60%);opacity:0;transition:opacity .2s}
  .sc:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.15);box-shadow:0 12px 32px rgba(0,0,0,.4)}
  .sc:hover::before{opacity:.06}
  .sc.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 24px rgba(0,229,160,.15)}
  .sc.playing::before{opacity:.08}
  .sc-logo{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:800;color:#fff;letter-spacing:.04em;position:relative;flex-shrink:0}
  .sc-logo .ov{position:absolute;inset:0;border-radius:12px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
  .sc:hover .ov,.sc.playing .ov{opacity:1}
  .sc.playing .ov{background:rgba(0,0,0,.3)}
  .sc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.875rem;line-height:1.2;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sc-genre{font-size:.75rem;color:var(--text2);margin-bottom:6px}
  .sc-city{font-size:.72rem;color:var(--text2);display:flex;align-items:center;gap:4px}
  .sc-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .sc-list{font-size:.7rem;color:var(--text2)}
  .sc-list span{color:var(--accent);font-weight:700}
  .sc-freq{font-size:.68rem;color:var(--text2);background:var(--surface2);padding:2px 7px;border-radius:4px}
  .live-ind{display:flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;color:var(--accent)}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.5s infinite}
  @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
  .tabs{display:flex;gap:6px;padding:20px 32px 0;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:7px 16px;border-radius:99px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid var(--border);color:var(--text2);background:none}
  .tab:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
  .tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .player{height:var(--ph);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;flex-shrink:0;position:relative;z-index:200}
  .pbar-wrap{position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}
  .pbar{height:100%;background:linear-gradient(90deg,var(--accent),#0099ff);width:0;transition:width .4s}
  .pstation{display:flex;align-items:center;gap:14px;min-width:0;flex:1}
  .plogo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.65rem;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:.04em}
  .pinfo .pname{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pinfo .pmeta{font-size:.75rem;color:var(--text2);margin-top:2px}
  .pmeta .ltag{color:var(--accent);font-weight:700}
  .pctrl{display:flex;align-items:center;gap:14px;flex-shrink:0}
  .cbtn{background:none;border:none;cursor:pointer;color:var(--text2);padding:8px;border-radius:8px;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .cbtn:hover{color:var(--text);background:var(--surface2)}
  .cbtn.primary{background:var(--accent);color:#000;width:44px;height:44px;border-radius:50%;padding:0}
  .cbtn.primary:hover{background:var(--accent2);transform:scale(1.05)}
  .pvol{display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:160px}
  .pvol svg{color:var(--text2);flex-shrink:0}
  input[type=range]{-webkit-appearance:none;appearance:none;height:3px;background:var(--surface2);border-radius:2px;cursor:pointer;flex:1}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}
  .pempty{flex:1;display:flex;align-items:center;gap:14px}
  .pempty-ico{color:var(--text2);opacity:.3}
  .pempty-txt{font-size:.85rem;color:var(--text2)}
  .spinner{width:20px;height:20px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:calc(var(--ph) + 14px);right:20px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:.82rem;color:var(--text2);z-index:300;transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">

<div class="app">

      <div class="aside-lbl">Regiões</div>
      <div id="region-nav"></div>
    </div>
  </aside>
  <main id="main"></main>
</div>

<div class="player">
  <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
  <div class="pempty" id="pempty">
    <svg class="pempty-ico" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="2"/><path d="M7 12a5 5 0 0 1 5-5"/><path d="M17 12a5 5 0 0 1-5 5"/>
      <path d="M4 12a8 8 0 0 1 8-8"/><path d="M20 12a8 8 0 0 1-8 8"/>
    </svg>
    <span class="pempty-txt">Selecione uma rádio para começar</span>
  </div>
  <div class="pstation" id="pstation" style="display:none">
    <div class="plogo" id="plogo"></div>
    <div class="pinfo">
      <div class="pname" id="pname">–</div>
      <div class="pmeta"><span class="ltag">● AO VIVO</span> &nbsp;<span id="pcity"></span></div>
    </div>
  </div>
  <div class="pctrl" id="pctrl" style="display:none">
    <button class="cbtn" onclick="prevStation()" title="Anterior">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
    </button>
    <button class="cbtn primary" id="btnPlay" onclick="togglePlay()">
      <svg id="iPlay" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <svg id="iPause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <div class="spinner" id="spinner"></div>
    </button>
    <button class="cbtn" onclick="nextStation()" title="Próxima">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
  </div>
  <div class="pvol" id="pvol" style="display:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <input type="range" id="vol" min="0" max="100" value="80" style="flex:1">
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audio" preload="none"></audio>

// state
const audio=document.getElementById('audio');
let cur=null,playing=false,region='all';
let favs=[];
try{favs=JSON.parse(localStorage.getItem('rw_f')||'[]')}catch(e){}
const flat=DATA.regions.flatMap(r=>r.stations.map(s=>({...s,rc:r.color})));

// boot
buildSidebar();
render();
document.getElementById('fav-count').textContent=favs.length;
document.getElementById('vol').addEventListener('input',e=>audio.volume=e.target.value/100);
audio.volume=0.8;
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  render(q.length>1?q:'');
});
audio.addEventListener('error',()=>{setLoad(false);playing=false;updBtn();toast('⚠️ Stream indisponível — tente outra rádio')});
audio.addEventListener('waiting',()=>setLoad(true));
audio.addEventListener('playing',()=>{playing=true;setLoad(false);updBtn()});

function buildSidebar(){
  const nav=document.getElementById('region-nav');
  DATA.regions.forEach(r=>{
    const d=document.createElement('div');
    d.className='ni';d.id='nav-'+r.id;
    d.onclick=()=>setRegion(r.id);
    d.innerHTML=`<span class="dot" style="background:${r.color}"></span>${r.label}<span class="cnt">${r.stations.length}</span>`;
    nav.appendChild(d);
  });
}

function setRegion(id){
  region=id;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  const t=document.getElementById('nav-'+id);
  if(t)t.classList.add('active');
  else document.getElementById('nav-'+(id==='all'?'all':'favorites')).classList.add('active');
  render();
}

function render(q){
  const main=document.getElementById('main');
  main.innerHTML='';
  if(region==='favorites'){
    const fst=flat.filter(s=>favs.includes(s.id));
    if(!fst.length){main.innerHTML='<div style="padding:60px 32px;text-align:center;color:var(--text2)">Nenhuma rádio favoritada ainda ❤️</div>';return;}
    main.appendChild(heroEl({label:'❤️ Favoritos',color:'#e74c3c',stations:fst}));
    main.appendChild(gridSec({label:'❤️ Favoritos',color:'#e74c3c',stations:fst}));
    return;
  }
  if(region!=='all'){
    const reg=DATA.regions.find(r=>r.id===region);
    if(!reg)return;
    main.appendChild(heroEl(reg));
    main.appendChild(featEl(reg));
    main.appendChild(gridSec(reg,q));
    return;
  }
  // all
  const h=document.createElement('div');
  h.className='hero';
  h.innerHTML=`<div class="hero-rl">🌐 Transmissão ao Vivo</div><h1>Ouça o Mundo ao Vivo</h1><p>50 estações • EUA, Europa, Ásia, Oceania e Rio de Janeiro</p>`;
  main.appendChild(h);
  const tabs=document.createElement('div');tabs.className='tabs';
  tabs.innerHTML=`<button class="tab active" onclick="setRegion('all')">Todas</button>`+
    DATA.regions.map(r=>`<button class="tab" onclick="setRegion('${r.id}')">${r.label}</button>`).join('');
  main.appendChild(tabs);
  DATA.regions.forEach(reg=>{
    let sts=reg.stations;
    if(q)sts=sts.filter(s=>(s.name+s.genre+s.city).toLowerCase().includes(q));
    if(!sts.length)return;
    main.appendChild(gridSec({...reg,stations:sts}));
  });
}

function heroEl(reg){
  const d=document.createElement('div');d.className='hero';
  d.innerHTML=`<div class="hero-rl" style="color:${reg.color}">${reg.label}</div>
    <h1>${reg.label.replace(/^\S+\s/,'').trim()} – Rádios Ao Vivo</h1>
    <p>${reg.stations.length} estações com streaming em tempo real</p>`;
  return d;
}

function featEl(reg){
  const sec=document.createElement('div');sec.className='feat-strip';
  sec.innerHTML=`<div class="sec-title">Em Destaque <span class="live-badge">AO VIVO</span></div>`;
  const g=document.createElement('div');g.className='feat-grid';
  reg.stations.slice(0,4).forEach(s=>{
    const c=document.createElement('div');
    c.className='fc'+(cur?.id===s.id?' playing':'');
    c.style.setProperty('--fcc',s.color||reg.color);
    c.innerHTML=`<div class="fc-logo" style="background:${s.color||reg.color}">${s.logo}</div>
      <div class="fc-info"><div class="fc-name">${s.name}</div><div class="fc-sub">${s.genre} · ${s.city}</div></div>`;
    c.onclick=()=>play(s);
    g.appendChild(c);
  });
  sec.appendChild(g);return sec;
}

function gridSec(reg,q){
  const sec=document.createElement('div');sec.className='stations-sec';
  sec.innerHTML=`<div class="sec-title">
    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${reg.color};margin-right:2px"></span>
    ${reg.label}
  </div>`;
  const g=document.createElement('div');g.className='grid';
  reg.stations.forEach(s=>g.appendChild(cardEl(s,reg.color)));
  sec.appendChild(g);return sec;
}

function cardEl(s,rc){
  const card=document.createElement('div');
  card.className='sc'+(cur?.id===s.id?' playing':'');
  card.style.setProperty('--scc',s.color||rc);
  card.id='c-'+s.id;
  const isP=cur?.id===s.id;
  const isF=favs.includes(s.id);
  card.innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div class="sc-logo" style="background:${s.color||rc}">
        ${s.logo}
        <div class="ov">
          ${isP
            ?`<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
            :`<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>`}
        </div>
      </div>
      <div style="min-width:0;flex:1">
        <div class="sc-name">${s.name}</div>
        <div class="sc-genre">${s.genre}</div>
        <div class="sc-city">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${s.city}
        </div>
      </div>
      <button style="background:none;border:none;cursor:pointer;padding:4px;color:${isF?'#e74c3c':'var(--text2)'};flex-shrink:0" 
        onclick="event.stopPropagation();toggleFav('${s.id}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${isF?'currentColor':'none'}" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>
    <div class="sc-footer">
      <div class="sc-list">Ouvintes: <span>${s.listeners}</span></div>
      ${isP
        ?`<div class="live-ind"><div class="live-dot"></div>AO VIVO</div>`
        :`<div class="sc-freq">${s.freq}</div>`}
    </div>`;
  card.onclick=()=>play(s);
  return card;
}

// player
function play(s){
  if(cur?.id===s.id&&playing){togglePlay();return;}
  cur=s;playing=false;
  document.getElementById('pempty').style.display='none';
  ['pstation','pctrl','pvol'].forEach(id=>document.getElementById(id).style.display='flex');
  const pl=document.getElementById('plogo');
  pl.textContent=s.logo;pl.style.background=s.color||'#00e5a0';
  document.getElementById('pname').textContent=s.name;
  document.getElementById('pcity').textContent=s.city+' · '+s.genre;
  startStream();
}

function startStream(){
  setLoad(true);
  audio.pause();audio.src='';
  audio.src=cur.stream;
  audio.load();
  audio.play()
    .then(()=>{playing=true;setLoad(false);updBtn();render();})
    .catch(()=>{setLoad(false);playing=false;updBtn();toast('⚠️ Stream indisponível — tente outra rádio');});
}

function togglePlay(){
  if(!cur)return;
  if(playing){audio.pause();playing=false;updBtn();}
  else startStream();
}

function updBtn(){
  document.getElementById('iPlay').style.display=playing?'none':'block';
  document.getElementById('iPause').style.display=playing?'block':'none';
}

function setLoad(v){
  document.getElementById('spinner').style.display=v?'block':'none';
  document.getElementById('iPlay').style.display=v?'none':(playing?'none':'block');
  document.getElementById('iPause').style.display=v?'none':(playing?'block':'none');
}

function prevStation(){
  if(!cur)return;
  const i=flat.findIndex(s=>s.id===cur.id);
  play(flat[(i-1+flat.length)%flat.length]);
}
function nextStation(){
  if(!cur)return;
  const i=flat.findIndex(s=>s.id===cur.id);
  play(flat[(i+1)%flat.length]);
}

function toggleFav(id){
  const i=favs.indexOf(id);
  if(i>-1)favs.splice(i,1);else favs.push(id);
  try{localStorage.setItem('rw_f',JSON.stringify(favs));}catch(e){}
  document.getElementById('fav-count').textContent=favs.length;
  render();
  toast(i>-1?'Removido dos favoritos':'❤️ Adicionado aos favoritos');
}

// progress animation for live stream
let pg=0;
setInterval(()=>{if(!playing)return;pg=(pg+0.12)%100;document.getElementById('pbar').style.width=pg+'%';},400);

let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
