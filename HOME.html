<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioWave – Ouça o Mundo ao Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ── THEME TOKENS ─────────────────────────────────────── */
:root {
  --bg:#0d0f14; --surface:#141720; --surface2:#1c2030; --surface3:#232840;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#e8eaf0; --text2:#8b92a8; --text3:#555f7a;
  --accent:#00e5a0; --accent2:#00b87a; --accent-glow:rgba(0,229,160,0.18);
  --red:#e74c3c; --ph:80px; --sw:244px;
  --shadow:0 8px 32px rgba(0,0,0,0.45);
  --radius:14px;
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"] {
  --bg:#f0f2f8; --surface:#ffffff; --surface2:#e8eaf4; --surface3:#dde0ef;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --text:#0d1117; --text2:#5a6278; --text3:#9aa0b5;
  --shadow:0 8px 32px rgba(0,0,0,0.10);
}

/* ── RESET ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .3s,color .3s}
img{display:block}
button{font-family:inherit;cursor:pointer}

/* ── LOGO ─────────────────────────────────────────────── */
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#00e5a0,#0099ff);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:22px;height:22px}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--text);letter-spacing:-.02em;line-height:1;transition:color .3s}
.logo-text em{color:var(--accent);font-style:normal}

/* ── HEADER ───────────────────────────────────────────── */
header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100;transition:background .3s,border-color .3s}
.hsearch{flex:1;max-width:480px;display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:0 14px;gap:8px;transition:background .3s,border-color .3s}
.hsearch svg{color:var(--text3);flex-shrink:0}
.hsearch input{background:none;border:none;outline:none;color:var(--text);font:inherit;font-size:.875rem;width:100%;padding:8px 0;transition:color .3s}
.hsearch input::placeholder{color:var(--text3)}
.hnav{display:flex;gap:4px;margin-left:auto;align-items:center}
.hnav a{color:var(--text2);text-decoration:none;font-size:.82rem;font-weight:500;padding:6px 12px;border-radius:6px;transition:var(--transition)}
.hnav a:hover{background:var(--surface2);color:var(--text)}
.theme-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);transition:var(--transition)}
.theme-btn:hover{color:var(--text);border-color:var(--border2)}
.theme-btn .icon-moon{display:block}
.theme-btn .icon-sun{display:none}
[data-theme="light"] .theme-btn .icon-moon{display:none}
[data-theme="light"] .theme-btn .icon-sun{display:block}

/* ── LAYOUT ───────────────────────────────────────────── */
.app{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ──────────────────────────────────────────── */
aside{width:var(--sw);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding-bottom:16px;transition:background .3s,border-color .3s}
aside::-webkit-scrollbar{width:3px}
aside::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.aside-sec{padding:18px 12px 6px}
.aside-lbl{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:0 8px 8px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:var(--transition);font-size:.85rem;color:var(--text2);font-weight:500;user-select:none}
.ni:hover{background:var(--surface2);color:var(--text)}
.ni.active{background:var(--accent-glow);color:var(--accent)}
.ni .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ni .cnt{margin-left:auto;font-size:.7rem;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:99px;transition:background .3s}
.ni.active .cnt{background:rgba(0,229,160,.15);color:var(--accent)}
aside hr{border:none;border-top:1px solid var(--border);margin:8px 12px}
.slogo{padding:18px 20px 0}

/* ── MAIN ─────────────────────────────────────────────── */
main{flex:1;overflow-y:auto;padding-bottom:24px;background:var(--bg);transition:background .3s}
main::-webkit-scrollbar{width:5px}
main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── HERO ─────────────────────────────────────────────── */
.hero{padding:32px 32px 24px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--accent-glow) 0%,transparent 55%);transition:border-color .3s}
.hero-rl{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.hero h1{font-family:'Syne',sans-serif;font-size:1.85rem;font-weight:800;line-height:1.1;margin-bottom:8px;letter-spacing:-.025em;color:var(--text)}
.hero p{font-size:.875rem;color:var(--text2)}

/* ── TABS ─────────────────────────────────────────────── */
.tabs{display:flex;gap:6px;padding:20px 32px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 15px;border-radius:99px;font-size:.8rem;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;border:1px solid var(--border);color:var(--text2);background:none}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* ── SECTION ──────────────────────────────────────────── */
.sec-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px;color:var(--text)}
.live-badge{font-size:.58rem;background:var(--red);color:#fff;padding:2px 7px;border-radius:4px;font-weight:700;animation:blink-badge 2s infinite}
@keyframes blink-badge{0%,100%{opacity:1}50%{opacity:.5}}

/* ── FEATURED STRIP ───────────────────────────────────── */
.feat-strip{padding:22px 32px;border-bottom:1px solid var(--border)}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.fc{border-radius:12px;padding:14px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--fcc,var(--accent));opacity:.8}
.fc:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--border2)}
.fc.playing{border-color:var(--accent)}
.fc-logo-wrap{width:46px;height:46px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--surface3);display:flex;align-items:center;justify-content:center}
.fc-logo-wrap img{width:100%;height:100%;object-fit:contain;padding:5px}
.fc-info .fc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;color:var(--text)}
.fc-info .fc-sub{font-size:.72rem;color:var(--text2)}

/* ── STATION GRID ─────────────────────────────────────── */
.stations-sec{padding:20px 32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:12px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--scc,#00e5a0),transparent 60%);opacity:0;transition:opacity .2s;pointer-events:none}
.sc:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:var(--shadow)}
.sc:hover::after{opacity:.05}
.sc.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 24px var(--accent-glow)}
.sc.playing::after{opacity:.07}
.sc-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.sc-logo-wrap{width:50px;height:50px;border-radius:11px;overflow:hidden;flex-shrink:0;background:var(--surface3);display:flex;align-items:center;justify-content:center;position:relative}
.sc-logo-wrap img{width:100%;height:100%;object-fit:contain;padding:5px}
.sc-play-ov{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;border-radius:11px}
.sc:hover .sc-play-ov,.sc.playing .sc-play-ov{opacity:1}
.sc.playing .sc-play-ov{background:rgba(0,0,0,.3)}
.sc-meta{flex:1;min-width:0}
.sc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.84rem;line-height:1.2;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.sc-genre{font-size:.71rem;color:var(--text2);margin-bottom:4px}
.sc-city{font-size:.67rem;color:var(--text3);display:flex;align-items:center;gap:3px}
.sc-fav{background:none;border:none;padding:3px;flex-shrink:0;color:var(--text3);transition:color .15s;line-height:1}
.sc-fav:hover{color:var(--red)}
.sc-fav.active{color:var(--red)}
.sc-footer{padding-top:9px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sc-listeners{font-size:.67rem;color:var(--text2)}
.sc-listeners strong{color:var(--accent);font-weight:700}
.sc-freq{font-size:.64rem;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:4px}
.live-ind{display:flex;align-items:center;gap:4px;font-size:.64rem;font-weight:700;color:var(--accent)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink-dot 1.5s infinite}
@keyframes blink-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.7)}}

/* ── AIRPLAY ──────────────────────────────────────────── */
.airplay-sec{padding:22px 32px;border-bottom:1px solid var(--border)}
.airplay-list{display:flex;flex-direction:column;gap:5px}
.ap-item{display:flex;align-items:center;gap:11px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:var(--transition)}
.ap-item:hover{background:var(--surface2);border-color:var(--border2)}
.ap-rank{font-family:'Syne',sans-serif;font-weight:800;font-size:.92rem;width:24px;text-align:center;flex-shrink:0;color:var(--text3)}
.ap-rank.gold{color:#f5a623}
.ap-rank.silver{color:#b0b8cc}
.ap-rank.bronze{color:#c9845a}
.ap-cover-wrap{width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--surface3)}
.ap-cover-wrap img{width:100%;height:100%;object-fit:cover}
.ap-info{flex:1;min-width:0}
.ap-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.ap-artist{font-size:.71rem;color:var(--text2);margin-top:1px}
.ap-plays{font-size:.69rem;font-weight:700;color:var(--accent);flex-shrink:0}
.ap-delta{font-size:.63rem;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.ap-delta.up{background:rgba(0,229,160,.13);color:var(--accent)}
.ap-delta.down{background:rgba(231,76,60,.11);color:var(--red)}
.ap-delta.same{background:var(--surface2);color:var(--text3)}

/* ── BOTTOM PLAYER ────────────────────────────────────── */
.player{height:var(--ph);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;position:relative;z-index:200;transition:background .3s,border-color .3s}
.pbar-wrap{position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}
.pbar{height:100%;background:linear-gradient(90deg,var(--accent),#0099ff);width:0;transition:width .35s linear}
.pempty{flex:1;display:flex;align-items:center;gap:12px}
.pempty-ico{color:var(--text3);opacity:.4}
.pempty-txt{font-size:.85rem;color:var(--text2)}
.pstation{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer}
.pstation:hover .pname{color:var(--accent)}
.plogo-wrap{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.plogo-wrap img{width:100%;height:100%;object-fit:contain;padding:4px}
.pname{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);transition:color .15s}
.pmeta{font-size:.71rem;color:var(--text2);margin-top:2px}
.pmeta .ltag{color:var(--accent);font-weight:700}
.pctrl{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cbtn{background:none;border:none;cursor:pointer;color:var(--text2);padding:8px;border-radius:8px;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.cbtn:hover{color:var(--text);background:var(--surface2)}
.cbtn.primary{background:var(--accent);color:#000;width:44px;height:44px;border-radius:50%;padding:0}
.cbtn.primary:hover{background:var(--accent2);transform:scale(1.05)}
.pvol{display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:140px}
.pvol svg{color:var(--text3);flex-shrink:0}
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;background:var(--surface3);border-radius:2px;cursor:pointer;flex:1}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--accent);border-radius:50%;cursor:pointer}
.expand-btn{background:none;border:none;color:var(--text2);padding:8px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.expand-btn:hover{color:var(--text);background:var(--surface2)}
.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .65s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FULLSCREEN PLAYER ────────────────────────────────── */
.fs-overlay{
  position:fixed;inset:0;z-index:1000;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);
  transition:background .4s;
}
.fs-overlay.open{display:flex}
.fs-bg{
  position:absolute;inset:-20px;
  background-size:cover;background-position:center;
  filter:blur(70px) saturate(1.6);opacity:.22;
  transition:background-image .5s;
}
.fs-close{
  position:absolute;top:24px;right:28px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:50%;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;transition:var(--transition);
  backdrop-filter:blur(8px);
}
.fs-close:hover{background:rgba(255,255,255,.18)}
.fs-content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:24px;
  padding:20px;max-width:400px;width:100%;text-align:center;
}
.fs-logo-wrap{
  width:200px;height:200px;border-radius:28px;overflow:hidden;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 32px 80px rgba(0,0,0,.55);
  transition:box-shadow .4s;
}
.fs-overlay.playing .fs-logo-wrap{
  box-shadow:0 0 0 3px var(--accent),0 32px 80px rgba(0,229,160,.2),0 0 100px rgba(0,229,160,.08);
}
.fs-logo-wrap img{width:100%;height:100%;object-fit:contain;padding:22px}
.fs-name{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;line-height:1.1}
.fs-sub{font-size:.85rem;color:rgba(255,255,255,.5);margin-top:4px}
.fs-live{display:flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;color:var(--accent);margin-top:-10px}
.fs-live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink-dot 1.4s infinite}
.fs-controls{display:flex;align-items:center;gap:18px}
.fs-btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:50%;width:50px;height:50px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;transition:var(--transition);
}
.fs-btn:hover{background:rgba(255,255,255,.18)}
.fs-btn.primary{background:var(--accent);border-color:var(--accent);color:#000;width:64px;height:64px}
.fs-btn.primary:hover{background:var(--accent2);transform:scale(1.06)}
.fs-spinner{width:22px;height:22px;border:2.5px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .65s linear infinite;display:none}
.fs-vol{display:flex;align-items:center;gap:10px;width:220px}
.fs-vol svg{color:rgba(255,255,255,.35);flex-shrink:0}
input.fs-range{-webkit-appearance:none;appearance:none;height:3px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;flex:1}
input.fs-range::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--accent);border-radius:50%;cursor:pointer}
.fs-info{font-size:.75rem;color:rgba(255,255,255,.35)}

/* ── TOAST ────────────────────────────────────────────── */
.toast{position:fixed;bottom:calc(var(--ph) + 14px);right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:.8rem;color:var(--text2);z-index:500;transform:translateY(16px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* ── NOW PLAYING (música identificada) ───────────────── */
/* Área inline no player mini */
.now-playing-inline{
  flex:1;min-width:0;display:flex;align-items:center;gap:10px;
  animation:np-fadein .4s ease;overflow:hidden;
}
@keyframes np-fadein{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.np-cover{
  width:42px;height:42px;border-radius:8px;flex-shrink:0;overflow:hidden;
  background:var(--surface3);display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.np-cover img{width:100%;height:100%;object-fit:cover}
.np-text{flex:1;min-width:0}
.np-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.83rem;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:.7rem;color:var(--text2);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-scanning{font-size:.7rem;color:var(--text3);display:flex;align-items:center;gap:5px}

/* Equalizer bars — scanning animation */
.eq-bars{display:inline-flex;align-items:flex-end;gap:2px;height:12px}
.eq-bars span{display:block;width:2px;background:var(--accent);border-radius:1px;animation:eq 0.8s ease-in-out infinite}
.eq-bars span:nth-child(1){height:4px;animation-delay:0s}
.eq-bars span:nth-child(2){height:10px;animation-delay:.12s}
.eq-bars span:nth-child(3){height:6px;animation-delay:.24s}
.eq-bars span:nth-child(4){height:11px;animation-delay:.36s}
.eq-bars span:nth-child(5){height:4px;animation-delay:.48s}
@keyframes eq{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}

/* Fullscreen now playing */
.fs-now-playing{
  width:100%;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.13);border-radius:14px;
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  animation:np-fadein .4s ease;
}
.fs-np-cover{width:46px;height:46px;border-radius:10px;flex-shrink:0;overflow:hidden;
  background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px}
.fs-np-cover img{width:100%;height:100%;object-fit:cover}
.fs-np-text{flex:1;min-width:0}
.fs-np-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);margin-bottom:3px}
.fs-np-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fs-np-artist{font-size:.74rem;color:rgba(255,255,255,.5);margin-top:2px}
.fs-np-scanning{font-size:.74rem;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:6px}

/* Mic waves animation (reused) */

.mic-waves span{display:block;width:2px;background:currentColor;border-radius:1px;animation:eq 0.9s ease-in-out infinite}

/* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
const LOGO_DOMAINS = {

  kost:"kost1035.com",wtop:"wtop.com",wbz:"wbz.com",kfi:"kfiam640.com",

  bbcr2:"bbc.co.uk",bbcr1:"bbc.co.uk",rtl:"rtl.fr",nrj:"nrj.fr",
  radiozet:"radiozet.pl",rairadio1:"rai.it",antena3:"antena3.com",
  swr3:"swr.de",europafm:"europafm.com",skyrock:"skyrock.com",
  air:"allindiaradio.gov.in",cnr:"cnr.cn",nhk1:"nhk.or.jp",
  rri:"rri.co.id",trt:"trt.net.tr",capitalfm:"capitalfm.com",
  rti:"rti.org.tw",jwave:"j-wave.co.jp",mbcfm4u:"imbc.com",sbspowerfm:"sbs.co.kr",
  kiis1065:"kiis1065.com.au",nova969:"nova969.com.au",gold1043:"gold1043.com.au",
  twogb:"2gb.com.au",threeaw:"3aw.com.au",triplej:"abc.net.au",abcrn:"abc.net.au",
  newstalkzb:"newstalkzb.co.nz",theedge:"theedge.co.nz",hit929:"hit929.com.au",
  tupi:"radiotupi.com.br",globo:"radioglobo.com.br",bandnews:"band.uol.com.br",
  cbn:"cbn.com.br",mec:"ebc.com.br",novabrasil:"novabrasilfm.com.br",
  "97fm":"jovempan.com.br","98fm":"98fm.com.br",transamerica:"transamerica.com.br"
};

// Two CDN sources: logo.dev (primary) → unavatar.io (fallback)
function logoSrc(id) {
  const d = LOGO_DOMAINS[id];
  if (!d) return null;
  return `https://img.logo.dev/${d}?token=pk_eTpFbVJQSamJGtIQeHbLDA&size=80&format=png`;
}
function logoFallbackSrc(id) {
  const d = LOGO_DOMAINS[id];
  if (!d) return null;
  return `https://logo.clearbit.com/${d}`;
}

function buildLogoImg(id, fallbackText, bgColor, size, padding=5) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;width:100%;height:100%`;

  const src = logoSrc(id);
  if (!src) { wrap.appendChild(makeText(fallbackText, size)); return wrap; }

  const img = document.createElement('img');
  img.src = src;
  img.alt = fallbackText;
  img.style.cssText = `width:100%;height:100%;object-fit:contain;padding:${padding}px`;

  // Chain fallbacks
  img.onerror = () => {
    const src2 = logoFallbackSrc(id);
    if (src2 && img.src !== src2) {
      img.onerror = () => img.replaceWith(makeText(fallbackText, size));
      img.src = src2;
    } else {
      img.replaceWith(makeText(fallbackText, size));
    }
  };
  wrap.appendChild(img);
  return wrap;
}

function makeText(text, size) {
  const el = document.createElement('div');
  const fs = size >= 160 ? '2.2rem' : size >= 80 ? '1rem' : '.6rem';
  el.style.cssText = `font-family:'Syne',sans-serif;font-size:${fs};font-weight:800;color:#fff;text-align:center;padding:4px;line-height:1.1;width:100%;display:flex;align-items:center;justify-content:center`;
  el.textContent = text;
  return el;
}

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
const audio = document.getElementById('audio');
let DATA=null, flat=[];
let cur=null, playing=false, region='all';
let favs=[];
try{favs=JSON.parse(localStorage.getItem('rw_f')||'[]')}catch(e){}

/* ══════════════════════════════════════════════════════
   THEME
══════════════════════════════════════════════════════ */
function toggleTheme(){
  const next = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('rw_theme',next)}catch(e){}
}
try{const t=localStorage.getItem('rw_theme');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}

/* ══════════════════════════════════════════════════════
   FETCH JSON
══════════════════════════════════════════════════════ */
fetch('https://raw.githubusercontent.com/pressrpg/radiowave.github.io/refs/heads/main/radios.json')
  .then(r=>r.json())
  .then(json=>{
    DATA=json;
    flat=DATA.regions.flatMap(r=>r.stations.map(s=>({...s,rc:r.color})));
    document.getElementById('total-count').textContent=flat.length;
    document.getElementById('fav-count').textContent=favs.length;
    buildSidebar();
    render();
  })
  .catch(()=>{
    document.getElementById('main').innerHTML='<div style="padding:60px 32px;text-align:center;color:var(--text2)">Erro ao carregar. Verifique sua conexão.</div>';
  });

/* ══════════════════════════════════════════════════════
   AUDIO EVENTS
══════════════════════════════════════════════════════ */
document.getElementById('vol').addEventListener('input',e=>{
  audio.volume=e.target.value/100;
  document.getElementById('fsVol').value=e.target.value;
});
document.getElementById('fsVol').addEventListener('input',e=>{
  audio.volume=e.target.value/100;
  document.getElementById('vol').value=e.target.value;
});
audio.volume=0.8;
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  render(q.length>1?q:'');
});
audio.addEventListener('error',()=>{setLoad(false);playing=false;updBtn();toast('⚠️ Stream indisponível — tente outra rádio')});
audio.addEventListener('waiting',()=>setLoad(true));
audio.addEventListener('playing',()=>{playing=true;setLoad(false);updBtn();render();if(npInterval===null)startAutoRecognition();});

/* ══════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════ */
function buildSidebar(){
  const nav=document.getElementById('region-nav');
  nav.innerHTML='';
  DATA.regions.forEach(r=>{
    const d=document.createElement('div');
    d.className='ni';d.id='nav-'+r.id;
    d.onclick=()=>setRegion(r.id);
    d.innerHTML=`<span class="dot" style="background:${r.color}"></span>${r.label}<span class="cnt">${r.stations.length}</span>`;
    nav.appendChild(d);
  });
}
function setRegion(id){
  region=id;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  const t=document.getElementById('nav-'+id);
  if(t)t.classList.add('active');
  render();
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function render(q){
  if(!DATA)return;
  const main=document.getElementById('main');
  main.innerHTML='';

  if(region==='airplay'){main.appendChild(airplaySection(false));return;}
  if(region==='favorites'){
    const fst=flat.filter(s=>favs.includes(s.id));
    if(!fst.length){main.innerHTML='<div style="padding:60px 32px;text-align:center;color:var(--text2)">Nenhuma rádio favoritada ainda ❤️</div>';return;}
    main.appendChild(heroEl({label:'❤️ Favoritos',color:'#e74c3c',stations:fst}));
    main.appendChild(gridSec({label:'❤️ Favoritos',color:'#e74c3c',stations:fst},q));
    return;
  }
  if(region!=='all'){
    const reg=DATA.regions.find(r=>r.id===region);
    if(!reg)return;
    main.appendChild(heroEl(reg));
    main.appendChild(featEl(reg));
    main.appendChild(gridSec(reg,q));
    return;
  }
  // ALL
  const h=document.createElement('div');h.className='hero';
  h.innerHTML=`<div class="hero-rl">🌐 Transmissão ao Vivo</div>
    <h1>Ouça o Mundo ao Vivo</h1>
    <p>${flat.length} estações · EUA, Europa, Ásia, Oceania e Rio de Janeiro</p>`;
  main.appendChild(h);
  const tabs=document.createElement('div');tabs.className='tabs';

function startStream(){
  setLoad(true);
  stopAutoRecognition();
  // Reset Web Audio source — crossOrigin deve ser definido ANTES de audio.src
  npSrc = null;
  if(npCtx && npCtx.state !== 'closed') { npCtx.close(); npCtx = null; }
  audio.pause(); audio.src = '';
  audio.crossOrigin = 'anonymous';
  audio.src = cur.stream;
  audio.load();
  audio.play()
    .then(()=>{playing=true;setLoad(false);updBtn();render();startAutoRecognition();})
    .catch(()=>{setLoad(false);playing=false;updBtn();toast('⚠️ Stream indisponível — tente outra rádio')});
}

  if(!cur)return;

/* ══════════════════════════════════════════════════════
   RECONHECIMENTO AUTOMÁTICO — captura local do <audio>
   Web Audio API → grava 8s → ACRCloud → resultado em ~5s
   Re-identifica a cada 35s automaticamente.
══════════════════════════════════════════════════════ */
const ACR_HOST   = 'identify-eu-west-1.acrcloud.com';
const ACR_KEY    = '5bb4a14d7c1ce3cf03dafd54fec6b73b';
const ACR_SECRET = 'OoKDSEQSFBcyHqPBOv0gvBWqE6TLNt2gOBKXSwYL';
const REC_SRATE  = 8000;
const REC_SECS   = 8;

let npInterval   = null;
let npCurrentKey = '';
let npCtx        = null;
let npSrc        = null; // MediaElementSource (único por elemento)
let npCapturing  = false;

function startAutoRecognition() {
  stopAutoRecognition();
  setNowPlayingScanning();
  // Primeira captura após 4s (stream precisa bufferizar)
  setTimeout(() => { if (playing) captureAndIdentify(); }, 4000);
  // Re-identifica a cada 35s
  npInterval = setInterval(() => { if (playing && !npCapturing) captureAndIdentify(); }, 35000);
}

function stopAutoRecognition() {
  clearInterval(npInterval);
  npInterval   = null;
  npCapturing  = false;
  npCurrentKey = '';
}

async function captureAndIdentify() {
  if (!cur || !playing || npCapturing) return;
  npCapturing = true;

  try {
    // Cria AudioContext uma vez (sample rate fixo em 8kHz para reduzir dados)
    if (!npCtx || npCtx.state === 'closed') {
      npCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: REC_SRATE });
    }
    if (npCtx.state === 'suspended') await npCtx.resume();

    // MediaElementSource só pode ser criado uma vez por elemento
    if (!npSrc) {
      audio.crossOrigin = 'anonymous'; // necessário antes de conectar ao Web Audio
      npSrc = npCtx.createMediaElementSource(audio);
      npSrc.connect(npCtx.destination); // mantém o som saindo nos alto-falantes
    }

    // Grava amostras via ScriptProcessor
    const chunks  = [];
    let   total   = 0;
    const target  = REC_SRATE * REC_SECS;
    const proc    = npCtx.createScriptProcessor(4096, 1, 1);

    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => { proc.disconnect(); reject(new Error('timeout')); }, 15000);

      proc.onaudioprocess = ev => {
        if (!playing) { clearTimeout(timeout); proc.disconnect(); reject(new Error('paused')); return; }
        const d = ev.inputBuffer.getChannelData(0);
        chunks.push(new Float32Array(d));
        total += d.length;
        if (total >= target) {
          clearTimeout(timeout);
          proc.disconnect();
          resolve();
        }
      };

      npSrc.connect(proc);
      proc.connect(npCtx.destination);
    });

    // Monta WAV
    const wav = buildWav(mergeChunks(chunks, total), REC_SRATE);

    // Assina e envia para ACRCloud
    const ts     = Math.floor(Date.now() / 1000);
    const sigStr = `POST\n/v1/identify\n${ACR_KEY}\naudio\n1\n${ts}`;
    const enc    = new TextEncoder();
    const cKey   = await crypto.subtle.importKey('raw', enc.encode(ACR_SECRET),
                     { name:'HMAC', hash:'SHA-1' }, false, ['sign']);
    const sigBuf = await crypto.subtle.sign('HMAC', cKey, enc.encode(sigStr));
    const sig    = btoa(String.fromCharCode(...new Uint8Array(sigBuf)));

    const fd = new FormData();
    fd.append('sample',            wav, 'sample.wav');
    fd.append('access_key',        ACR_KEY);
    fd.append('data_type',         'audio');
    fd.append('signature_version', '1');
    fd.append('signature',         sig);
    fd.append('timestamp',         ts);

    const res  = await fetch(`https://${ACR_HOST}/v1/identify`, { method:'POST', body:fd });
    const data = await res.json();

    if (data.status?.code === 0 && data.metadata?.music?.length) {
      const m   = data.metadata.music[0];
      const key = (m.title + '|' + (m.artists?.[0]?.name || '')).toLowerCase();
      if (key !== npCurrentKey) {
        npCurrentKey = key;
        setNowPlayingResult({
          title:  m.title,
          artist: (m.artists || []).map(a => a.name).join(', '),
          cover:  m.external_metadata?.spotify?.album?.images?.[0]?.url ||
                  m.external_metadata?.deezer?.track?.album?.cover_medium || null
        });
      }
    }
    // código 1001 = sem resultado — mantém o último identificado silenciosamente
  } catch(e) {
    // CORS ou outro erro — fallback: tenta pelo microfone se disponível
    if (e.message !== 'paused' && e.message !== 'timeout') tryMicFallback();
  } finally {
    npCapturing = false;
  }
}

// Fallback: microfone (quando stream bloqueia CORS)
async function tryMicFallback() {
  if (!cur || !playing || npCapturing) return;
  npCapturing = true;
  try {
    const stream  = await navigator.mediaDevices.getUserMedia({ audio:true });
    const ctx     = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: REC_SRATE });
    const src     = ctx.createMediaStreamSource(stream);
    const proc    = ctx.createScriptProcessor(4096, 1, 1);
    const chunks  = []; let total = 0;
    const target  = REC_SRATE * REC_SECS;

    await new Promise(resolve => {
      const t = setTimeout(() => { proc.disconnect(); src.disconnect(); ctx.close(); stream.getTracks().forEach(t=>t.stop()); resolve(); }, 15000);
      proc.onaudioprocess = ev => {
        const d = ev.inputBuffer.getChannelData(0);
        chunks.push(new Float32Array(d)); total += d.length;
        if (total >= target) { clearTimeout(t); proc.disconnect(); src.disconnect(); stream.getTracks().forEach(t=>t.stop()); resolve(); }
      };
      src.connect(proc); proc.connect(ctx.destination);
    });
    ctx.close();

    const wav = buildWav(mergeChunks(chunks, total), REC_SRATE);
    const ts  = Math.floor(Date.now() / 1000);
    const sigStr = `POST\n/v1/identify\n${ACR_KEY}\naudio\n1\n${ts}`;
    const enc = new TextEncoder();
    const ck  = await crypto.subtle.importKey('raw', enc.encode(ACR_SECRET), {name:'HMAC',hash:'SHA-1'}, false, ['sign']);
    const sb  = await crypto.subtle.sign('HMAC', ck, enc.encode(sigStr));
    const sig = btoa(String.fromCharCode(...new Uint8Array(sb)));
    const fd  = new FormData();
    fd.append('sample', wav, 's.wav'); fd.append('access_key', ACR_KEY);
    fd.append('data_type','audio'); fd.append('signature_version','1');
    fd.append('signature', sig); fd.append('timestamp', ts);
    const res  = await fetch(`https://${ACR_HOST}/v1/identify`, {method:'POST',body:fd});
    const data = await res.json();
    if (data.status?.code === 0 && data.metadata?.music?.length) {
      const m = data.metadata.music[0];
      const key = (m.title+'|'+(m.artists?.[0]?.name||'')).toLowerCase();
      if (key !== npCurrentKey) {
        npCurrentKey = key;
        setNowPlayingResult({ title:m.title, artist:(m.artists||[]).map(a=>a.name).join(', '),
          cover: m.external_metadata?.spotify?.album?.images?.[0]?.url || null });
      }
    }
  } catch(e) { /* microfone negado ou erro */ }
  npCapturing = false;
}

function mergeChunks(chunks, total) {
  const out = new Float32Array(total); let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out;
}

function buildWav(samples, sr) {
  const buf  = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buf);
  const ws   = (o,s) => { for(let i=0;i<s.length;i++) view.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,'RIFF'); view.setUint32(4,36+samples.length*2,true);
  ws(8,'WAVE'); ws(12,'fmt '); view.setUint32(16,16,true);
  view.setUint16(20,1,true); view.setUint16(22,1,true);
  view.setUint32(24,sr,true); view.setUint32(28,sr*2,true);
  view.setUint16(32,2,true); view.setUint16(34,16,true);
  ws(36,'data'); view.setUint32(40,samples.length*2,true);
  for(let i=0;i<samples.length;i++){
    const s=Math.max(-1,Math.min(1,samples[i]));
    view.setInt16(44+i*2,s<0?s*0x8000:s*0x7FFF,true);
  }
  return new Blob([buf],{type:'audio/wav'});
}

let pg=0;
setInterval(()=>{
  if(!playing)return;
  pg=(pg+0.1)%100;
  document.getElementById('pbar').style.width=pg+'%';
},400);

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
